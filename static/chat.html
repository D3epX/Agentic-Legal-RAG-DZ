        function buildSources(source,docs,plat,generationProvider){
            var map={
                'platform_docs':{cls:'platform',label:'Platform Docs'},
                'nlp_knowledge':{cls:'platform',label:'NLP Knowledge'},
                'resources':{cls:'platform',label:'Resources'},
                'legal':{cls:'legal',label:'Legal'},
                'user_document':{cls:'user_document',label:'Your Document'},
                'platform':{cls:'platform',label:'Platform'},
                'groq':{cls:'groq',label:'AI'},
                'web_exa':{cls:'web_exa',label:'Live Web (Exa)'},
                'web_tavily':{cls:'web_tavily',label:'Live Web'},
                'web':{cls:'web',label:'Live Web'},
            };
            var out=[];
            var provider=(generationProvider||'').toString().trim().toLowerCase();
            if(provider){
                out.push({
                    cls:provider==='gemini'?'provider-gemini':provider==='groq'?'provider-groq':'default',
                    label:'Model: '+providerDisplayLabel(provider),
                    sim:null
                });
            }
            if(docs&&docs.length>0){
                /* Deduplicate by filename — keep best similarity per unique file */
                var seen={};
                docs.forEach(function(d){
                    var m=map[d.source]||{cls:'default',label:d.source};
                    var lbl=d.title||m.label;
                    var key=lbl+'|'+m.cls;
                    var sim=d.similarity||0;
                    var rawUrl=(d.url||'').toString().trim();
                    var candidateUrl=/^https?:\/\//i.test(rawUrl)?rawUrl:'';
                    if(!seen[key]||sim>seen[key].sim){
                        seen[key]={cls:m.cls,label:lbl,sim:sim,source:d.source,url:candidateUrl};
                    }
                });
                Object.keys(seen).forEach(function(k){
                    var s=seen[k];
                    /* Hide raw similarity % for user documents — not meaningful */
                    var simLabel=(s.source!=='user_document'&&s.sim)?Math.round(s.sim*100)+'%':null;
                    out.push({cls:s.cls,label:s.label,sim:simLabel,url:s.url||null});
                });
            }
            if(out.length===0&&source&&source!=='none'&&source!=='error'&&source!=='system'&&!isWebSource(source)){var m=map[source]||{cls:'default',label:source};out.push({cls:m.cls,label:m.label,sim:null})}
            return out;
        }

        /* ── Typewriter ── */
        function typewriter(el,text){
            var rendered=renderMd(text);
            var tmp=document.createElement('div');tmp.innerHTML=rendered;
            var plain=tmp.textContent||'';
            var CPT=3,MS=12,i=0;
            function tick(){
                i+=CPT;
                if(i>=plain.length){el.innerHTML=rendered;scrollBottom();return}
                el.innerHTML=renderMd(plain.substring(0,i))+'<span class="typing-cursor"></span>';
                scrollBottom();requestAnimationFrame(function(){setTimeout(tick,MS)});
            }
            tick();
        }

        /* ── Platform cards ── */
        function buildCards(results){
            var icons={
                course:{icon:'<i class="fas fa-graduation-cap"></i>',cls:'pci-course'},
                tool:{icon:'<i class="fas fa-wrench"></i>',cls:'pci-tool'},
                corpus:{icon:'<i class="fas fa-database"></i>',cls:'pci-corpus'},
                resource:{icon:'<i class="fas fa-book-open"></i>',cls:'pci-resource'},
                event:{icon:'<i class="fas fa-calendar-alt"></i>',cls:'pci-event'},
                project:{icon:'<i class="fas fa-project-diagram"></i>',cls:'pci-project'},
                institution:{icon:'<i class="fas fa-university"></i>',cls:'pci-institution'},
                user:{icon:'<i class="fas fa-user"></i>',cls:'pci-user'},
            };
            /* Filter out meta types — my_contributions/stats shown in answer body, no_data is not a real card */
            var filtered=results.filter(function(r){return r.type!=='my_contributions' && r.type!=='stats' && r.type!=='no_data'});
            if(filtered.length===0) return '';
            var h='<div class="platform-cards">';
            filtered.forEach(function(r){
                var ti=icons[r.type]||{icon:'<i class="fas fa-link"></i>',cls:'pci-resource'};
                var url=r.url||'#';
                var title=esc((r.title||r.name||'\u2014').substring(0,80));
                var desc=esc((r.description||'').substring(0,120));
                var meta='';
                var tags=[r.language,r.tool_type,r.event_type,r.institution_type,r.field,r.author].filter(Boolean);
                if(tags.length>0){meta='<div class="p-card-meta">'+tags.slice(0,3).map(function(t){return '<span class="meta-tag">'+esc(t)+'</span>'}).join('')+'</div>'}
                h+='<a class="p-card" href="'+esc(url)+'" target="_blank" rel="noopener">'
                    +'<div class="p-card-head"><div class="p-card-icon '+ti.cls+'">'+ti.icon+'</div><span class="p-card-type">'+esc(r.type)+'</span></div>'
                    +'<div class="p-card-title">'+title+'</div><div class="p-card-desc">'+desc+'</div>'+meta
                    +'<div class="p-card-link">Open <i class="fas fa-arrow-right"></i></div></a>';
            });
            h+='</div>';return h;
        }

        function renderPlatformResults(data){
            var results=data.results||[];
            if(results.length===0){addSystem("No results found.",'system');return}
            var block=document.createElement('div');block.className='answer-block';
            var html='<div class="answer-head"><div class="answer-icon"><i class="fas fa-search"></i></div>'
                +'<span class="answer-lbl">Found '+(data.total||results.length)+' results</span></div>';
            html+=buildCards(results);block.innerHTML=html;msgsArea.appendChild(block);scrollBottom();
        }

        function setLoading(v){isLoading=v;sendBtn.disabled=v;chatInput.disabled=v}

        function entityIcon(type){
            var icons={
                course:{icon:'<i class="fas fa-graduation-cap"></i>',cls:'pci-course'},
                tool:{icon:'<i class="fas fa-wrench"></i>',cls:'pci-tool'},
                corpus:{icon:'<i class="fas fa-database"></i>',cls:'pci-corpus'},
                resource:{icon:'<i class="fas fa-book-open"></i>',cls:'pci-resource'},
                event:{icon:'<i class="fas fa-calendar-alt"></i>',cls:'pci-event'},
                project:{icon:'<i class="fas fa-project-diagram"></i>',cls:'pci-project'},
                institution:{icon:'<i class="fas fa-university"></i>',cls:'pci-institution'},
                user:{icon:'<i class="fas fa-user"></i>',cls:'pci-user'},
                post:{icon:'<i class="fas fa-newspaper"></i>',cls:'pci-resource'}
            };
            return icons[type]||{icon:'<i class="fas fa-link"></i>',cls:'pci-resource'};
        }

        function normalizeEntityContext(ctx){
            return {
                type:(ctx.type||ctx.contentType||'resource').toString().trim().toLowerCase(),
                title:(ctx.title||'').toString().trim(),
                description:(ctx.description||'').toString().trim(),
                category:(ctx.category||'').toString().trim(),
                author:(ctx.author||'').toString().trim(),
                url:(ctx.url||ctx.link||'').toString().trim()
            };
        }

        function safeEntityUrl(url){
            if(!url) return '';
            var u=url.toString().trim();
            if(!u) return '';
            if(u.startsWith('/')) return u;
            if(/^https?:\/\//i.test(u)) return u;
            return '';
        }

        function cleanContextText(value){
            if(!value) return '';
            return value
                .toString()
                .replace(/[*_`#]/g,' ')
                .replace(/<[^>]+>/g,' ')
                .replace(/\[(.*?)\]\((.*?)\)/g,'$1')
                .replace(/\s+/g,' ')
                .trim();
        }

        function trimSentence(text,maxLen){
            var t=(text||'').trim();
            if(!t||t.length<=maxLen) return t;
            var cut=t.slice(0,maxLen);
            var lastSpace=cut.lastIndexOf(' ');
            if(lastSpace>80) cut=cut.slice(0,lastSpace);
            return cut.replace(/[\s,;:.]+$/,'')+'...';
        }

        function buildContextSummary(ctx){
            var rawDesc=cleanContextText(ctx.description||'');
            if(!rawDesc) return '';

            var authorsMatch=rawDesc.match(/Authors?\s*:\s*(.+?)(?=\s+Year\s*:|\s+Abstract\s*:|$)/i);
            var yearMatch=rawDesc.match(/Year\s*:\s*(\d{4})/i);
            var abstractMatch=rawDesc.match(/Abstract\s*:\s*(.+)$/i);

            if(authorsMatch||yearMatch||abstractMatch){
                var authors=authorsMatch?trimSentence(authorsMatch[1],120):'';
                var year=yearMatch?yearMatch[1]:'';
                var abstractText=abstractMatch?trimSentence(abstractMatch[1],220):trimSentence(rawDesc,220);
                var head='';
                if(authors&&year) head='Research item by '+authors+' ('+year+'). ';
                else if(authors) head='Research item by '+authors+'. ';
                else if(year) head='Research item published in '+year+'. ';
                return (head+abstractText).trim();
            }

            if(ctx.type==='tool' || /\bdataset\b/i.test(ctx.category||'') || /^\s*\[dataset\]/i.test(rawDesc)){
                var normalized=rawDesc.replace(/^\s*\[dataset\]\s*/i,'Dataset: ');
                return trimSentence(normalized,220);
            }

            return trimSentence(rawDesc,220);
        }

        function addEntityContextCard(rawCtx){
            var ctx=normalizeEntityContext(rawCtx||{});
            if(!ctx.title) return;
            var contextKey=(ctx.type||'resource')+'::'+(ctx.title||'');
            var exists=false;
            msgsArea.querySelectorAll('.context-preview-wrap').forEach(function(node){
                if(node.getAttribute('data-context-key')===contextKey) exists=true;
            });
            if(exists) return;
            var ico=entityIcon(ctx.type);
            var href=safeEntityUrl(ctx.url);
            var summary=buildContextSummary(ctx);
            var block=document.createElement('div');
            block.className='context-preview-wrap';
            block.setAttribute('data-context-key',contextKey);
            var tags=[ctx.type,ctx.category,ctx.author].filter(Boolean).slice(0,3)
                .map(function(v){return '<span class="meta-tag">'+esc(v)+'</span>'}).join('');

            block.innerHTML=''
                +'<div class="context-preview-label"><i class="fas fa-compass"></i><span>Selected Context</span></div>'
                +'<div class="context-preview-card">'
                +'<div class="context-preview-head"><div class="p-card-icon '+ico.cls+'">'+ico.icon+'</div><div class="context-preview-title">'+esc(ctx.title)+'</div></div>'
                +(summary?'<div class="context-preview-desc">'+esc(summary)+'</div>':'')
                +(tags?'<div class="context-preview-meta">'+tags+'</div>':'')
                +(href?'<div class="context-preview-actions"><a class="context-preview-link" href="'+esc(href)+'" target="_blank" rel="noopener noreferrer">Open Resource <i class="fas fa-arrow-up-right-from-square"></i></a></div>':'')
                +'</div>';
            msgsArea.appendChild(block);
            scrollBottom();
        }

        /* ============================================================
           AUTO-EXPLAIN: when chatbot opens from an entity detail page
           ============================================================ */
        async function autoExplainEntity(){
            var raw='{}';
            if(!raw||raw==='{}') return;
            var ctx;
            try{ctx=JSON.parse(raw)}catch(e){return}
            ctx=normalizeEntityContext(ctx);
            if(!ctx.title) return;

            /* Reload case: if this card already exists in loaded history,
               do not create another new chat. */
            var existingKey=(ctx.type||'resource')+'::'+(ctx.title||'');
            var alreadyLoaded=false;
            msgsArea.querySelectorAll('.context-preview-wrap').forEach(function(node){
                if(node.getAttribute('data-context-key')===existingKey) alreadyLoaded=true;
            });
            if(alreadyLoaded) return;

            /* Always create a NEW chat when coming from a card (first time). */
            try{
                var sr=await fetch('/sessions?user_id='+encodeURIComponent(USER_ID),{method:'POST'});
                if(!sr.ok) return;
                var sd=await sr.json();
                if(sd.session_id){
                    currentSessionId=sd.session_id;
                    persistCurrentSessionId();
                }else return;
            }catch(e){return}

            /* Reset UI for the new session */
            selectedFiles=[];activeDocumentId=null;hasDocuments=false;renderFilePills();clearChat();

            showMsgs();
            addEntityContextCard(ctx);
            setLoading(true);
            var thinkEl=addThinking();

            try{
                var payload={
                    mode:'platform_entity',
                    session_id:currentSessionId,
                    entity_context:{
                        type:ctx.type||'resource',
                        title:ctx.title||'',
                        description:ctx.description||'',
                        category:ctx.category||'',
                        author:ctx.author||'',
                        url:ctx.url||''
                    }
                };

                resp.user_id=USER_ID;var resp=await fetch('/conversation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...payload,user_id:USER_ID})});
                thinkEl.remove();
                var data=await resp.json();
                if(!resp.ok) throw new Error(data.error||'Error '+resp.status);
                if(data.session_id){currentSessionId=data.session_id;persistCurrentSessionId();}
                if(data.answer) addAnswer(data.answer,data.source,data.lang,null,null,false,null,null,data.web_results||null,data.generation_provider||null);
                loadSessions();
            }catch(e){thinkEl.remove();console.error('AutoExplain:',e);addSystem(e.message,'error')}
            finally{setLoading(false)}
        }

        /* ============================================================
           AUTO-ANALYSE: when chatbot opens from a document detail page
           ============================================================ */
        async function autoAnalyseDocument(){
            var raw='{}';
            if(!raw||raw==='{}') return;
            var ctx;
            try{ctx=JSON.parse(raw)}catch(e){return}
            if(!ctx.document_id||!ctx.document_file_url) return;

            /* Ensure we have a session */
            if(!currentSessionId){
                try{
                    var sr=await fetch('/sessions?user_id='+encodeURIComponent(USER_ID),{method:'POST'});
                    if(!sr.ok) return;
                    var sd=await sr.json();
                    if(sd.session_id){currentSessionId=sd.session_id;persistCurrentSessionId();}
                    else return;
                }catch(e){return}
            }

            /* Prevent regenerate on reload */
            var docMsg = "Analyse document: "+(ctx.document_title||'Document');
            var alreadyLoaded = false;
            msgsArea.querySelectorAll('.msg-bubble').forEach(function(node){
                if(node.textContent.trim() === docMsg) alreadyLoaded = true;
            });
            if(alreadyLoaded) return;

            showMsgs();
            addUserMsg(docMsg);
            setLoading(true);
            var thinkEl=addThinking();

            try{
                var payload={
                    mode:'platform_document',
                    session_id:currentSessionId,
                    document_context:{
                        document_id:ctx.document_id,
                        document_title:ctx.document_title||'',
                        document_file_url:ctx.document_file_url
                    }
                };
                var resp=await fetch('/conversation',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify(payload)
                });
                thinkEl.remove();
                var data=await resp.json();
                if(!resp.ok) throw new Error(data.error||'Error '+resp.status);
                if(data.session_id){currentSessionId=data.session_id;persistCurrentSessionId();}
                if(data.document_id) activeDocumentId=data.document_id;
                hasDocuments=true;
                if(data.answer) addAnswer(data.answer,data.source,data.lang,data.retrieved_docs||null,null,true,null,null,data.web_results||null,data.generation_provider||null);
                else if(data.document_status==='processing') addSystem("Document is still processing. Please ask again shortly.",'system');
                loadSessions();
            }catch(e){thinkEl.remove();console.error('AutoAnalyse:',e);addSystem(e.message,'error')}
            finally{setLoading(false)}
        }

        function hasInitialEntityContext(){
            var raw='{}';
            return !!raw && raw!=='{}';
        }

        function hasInitialDocumentContext(){
            var raw='{}';
            return !!raw && raw!=='{}';
        }

        /* ============================================================
           FEATURE 4: PIN TOGGLE — AJAX handler
           ============================================================ */
        function togglePin(btn,blockEl){
            var mid=btn.getAttribute('data-mid');
            if(!mid){
                /* For dynamically-created answer pins without message_id yet */
                return;
            }
            /* message pin not supported in standalone mode */
            })
                .catch(function(e){console.error('Pin toggle:',e)});
        }

        /* ── Init ── */
        loadSessions({hydrateInitial:true})
            .then(function(){return autoExplainEntity();})
            .then(function(){return autoAnalyseDocument();});
    })();
    </script>
